<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess Who I Am ❤️ am i the person who silently keeps on noticing you sitting at corner</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

/* ===== BASIC ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}

body{
background:linear-gradient(135deg,#ff1744,#8e0038);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow-y:auto;
overflow-x:hidden;
color:white;
}

/* ===== LOCK SCREEN ===== */
#lockScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
transition: opacity 1s ease;
opacity: 1;
}

#lockScreen input{
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
}

#lockScreen button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:20px;
cursor:pointer;
}

/* ===== MAIN ===== */
.container{
width:90%;
max-width:420px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
border-radius:25px;
padding:25px;
text-align:center;
box-shadow:0 0 30px rgba(255,255,255,.3);
position:relative;
z-index:2;
}

h1{
font-family:'Great Vibes', cursive;
font-size:48px;
margin-bottom:10px;
}

.slider{
width:100%;
height:360px;
overflow:hidden;
border-radius:20px;
margin-bottom:10px;
}

.slider img{
width:100%;
height:100%;
object-fit:cover;
transition:0.5s;
}

/* ===== TEXT ===== */
#question{
margin:10px 0;
font-size:20px;
}

#result{
margin-top:10px;
font-size:18px;
color:#fff59d;
}

#typing{
margin-top:10px;
font-size:14px;
opacity:0.9;
}

/* ===== BUTTONS ===== */
.buttons{
display:flex;
justify-content:center;
gap:15px;
margin-top:15px;
position:relative;
height:180px;
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

#yesBtn{
background:white;
color:#e91e63;
}

#noBtn{
background:#ffb3c7;
color:#b0003a;
position:relative;
}

/* ===== HEARTS ===== */
.hearts span{
position:absolute;
color:pink;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(110vh);opacity:0;}
}

</style>
</head>

<body>

<!-- ===== LOCK ===== -->
<div id="lockScreen">
<h2>Enter Password ❤️</h2>
<input type="password" id="pass">
<button onclick="checkPass()">Enter</button>
</div>

<!-- ===== HEARTS ===== -->
<div class="hearts"></div>

<!-- ===== MAIN ===== -->
<div class="container">

<h1>Guess Who I Am? ❤️</h1>
<h3>Dear Priyanshi</h3>

<div class="slider">
<img id="slide" src="photo1.jpg">
</div>

<h2 id="question">Will you forever be mine? ❤️</h2>

<p id="typing"></p>
<p id="result"></p>

<div class="buttons">
<button id="yesBtn" onclick="yesClicked()">💖 Yes</button>
<button id="noBtn" onclick="noClicked()">🥺 No</button>
</div>

</div>

<!-- ===== MUSIC ===== -->
<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<!-- ===== JS ===== -->
<script>

/* PASSWORD */
function checkPass(){
if(document.getElementById("pass").value=="love"){
const lock = document.getElementById("lockScreen");
lock.style.opacity = "0";
setTimeout(function(){
lock.style.display = "none";
typeWriter();},1000);
document.getElementById("music").play();
}
else{
alert("Wrong Password 😢");
}
}

/* SLIDER */
const photos=["photo1.jpg"];
let current=0;
const slide=document.getElementById("slide");

setInterval(()=>{
current=(current+1)%photos.length;
slide.style.opacity=0;

setTimeout(()=>{
slide.src=photos[current];
slide.style.opacity=1;
},400);
},3000);

/* YES / STORY */
let stage=0;

function yesClicked(){
const q=document.getElementById("question");
const r=document.getElementById("result");

if(stage===0){
q.innerHTML="Do you really mean it? ❤️";
r.innerHTML="I like your answer 🥰";
stage++;
}
else if(stage===1){
q.innerHTML="Are you really sure? 💖";
r.innerHTML="My heart is waiting 🥺";
stage++;
}
else{
q.innerHTML="💖 Thank You, Priyanshi! 💖";

r.innerHTML=
"From today, every heartbeat of mine belongs to you. ❤️<br><br>I promise to always care for you, respect you, and stand by your side forever. 🥰💍";

confetti();

document.getElementById("yesBtn").innerHTML="❤️ Forever ❤️";

document.getElementById("noBtn").style.display="none";
}
}

/* NO BUTTON */
function noClicked(){

const btn=document.getElementById("noBtn");

document.getElementById("result").innerHTML=
"🥺 Please... think once more ❤️";

btn.style.position="fixed";

btn.style.left=(Math.random()*(window.innerWidth-120))+"px";

btn.style.top=(Math.random()*(window.innerHeight-60))+"px";

btn.style.transition="0.2s";

}

/* HEARTS */
function createHeart(){
const h=document.createElement("span");
h.innerHTML="❤";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(Math.random()*20+15)+"px";
h.style.animationDuration=(Math.random()*5+5)+"s";

document.querySelector(".hearts").appendChild(h);
setTimeout(()=>h.remove(),10000);
}
setInterval(createHeart,300);

/* CONFETTI */
function confetti(){
for(let i=0;i<100;i++){
let s=document.createElement("span");
s.innerHTML="💖";
s.style.position="fixed";
s.style.left=Math.random()*100+"vw";
s.style.top="-10px";
s.style.fontSize="20px";
s.style.animation="fall 3s linear";
document.body.appendChild(s);
setTimeout(()=>s.remove(),3000);
}
}

/* MUSIC START */
window.addEventListener("click",()=>{
document.getElementById("music").play();
});

/* TYPING */
const text="I don't know who will read this... but my heart belongs to you ❤️";
let i=0;

function typeWriter(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(typeWriter,50);
}
}
</script>

</body>
</html>
